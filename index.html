<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Local Service Radio — on air soon</title>
<meta name="description" content="Local Service Radio. On air soon." />
<meta property="og:title" content="Local Service Radio" />
<meta property="og:description" content="On air soon." />
<meta property="og:type" content="website" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23F3E2C4'/%3E%3Ctext x='50%25' y='54%25' font-family='Georgia,serif' font-size='40' text-anchor='middle' fill='%23B4411F'%3EL%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #f3e2c4;
    --ink: #1a1a1a;
    --accent: #b4411f;
    --muted: #7a6a52;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 2rem;
    line-height: 1.4;
  }
  header, footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "Courier New", monospace;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  .dot {
    display: inline-block;
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 0.5rem;
    animation: pulse 2s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  h1 {
    font-size: clamp(2.5rem, 9vw, 6.5rem);
    line-height: 0.95;
    margin: 0 0 1.5rem 0;
    font-weight: normal;
    letter-spacing: -0.02em;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .tagline {
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    max-width: 32rem;
    color: var(--muted);
    margin: 0 0 3rem 0;
  }
  .status {
    font-family: "Courier New", monospace;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.75rem 0;
    border-top: 1px solid rgba(26,26,26,0.15);
    border-bottom: 1px solid rgba(26,26,26,0.15);
    display: flex;
    justify-content: space-between;
    max-width: 32rem;
  }
  footer { margin-top: 3rem; }
  a { color: var(--ink); text-decoration: none; border-bottom: 1px solid rgba(26,26,26,0.3); }
  a:hover { border-bottom-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
  <header>
    <span>Local Service Radio</span>
    <span>Est. 2026</span>
  </header>

  <main>
    <h1><span class="dot"></span>On air <em>soon</em>.</h1>
    <p class="tagline">Radio for the neighborhood, programmed by the people who actually live here.</p>
    <div class="status">
      <span>Signal: testing</span>
      <span>Frequency: TBA</span>
    </div>
  </main>

  <footer>
    <span>LSR / NYC</span>
    <span><a href="mailto:hello@localserviceradio.com">hello@localserviceradio.com</a></span>
  </footer>
</body>
</html>
