<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Local Service Radio</title>
<meta name="description" content="Local Service Radio. On air soon." />
<meta property="og:title" content="Local Service Radio" />
<meta property="og:description" content="On air soon..." />
<style>
  :root {
    --bg: #1a1613;
    --ink: #ffffff;
    --accent: #d49a3c;
    --signal: #e0503c;
    --muted: #8a7f74;
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 3rem 2.5rem;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    max-width: 60rem;
  }
  h1 {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1;
    margin: 0 0 1.5rem 0;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: clamp(1.25rem, 2.5vw, 1.75rem);
    font-weight: 600;
    color: var(--signal);
    margin: 0 0 3rem 0;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    animation: pulse 2.4s ease-in-out infinite;
  }
  .dot {
    width: 0.45em;
    height: 0.45em;
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0.8em var(--signal);
    display: inline-block;
    flex-shrink: 0;
    transform: translateY(0.12em);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.82; }
  }
  @media (prefers-reduced-motion: reduce) {
    .subtitle { animation: none; }
  }
  .contact {
    color: var(--muted);
    font-size: 0.95rem;
  }
  .contact a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--muted);
    padding-bottom: 1px;
  }
  .contact a:hover { border-bottom-color: var(--accent); color: var(--accent); }
  footer {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    align-self: flex-end;
    margin-top: 2rem;
  }
</style>
</head>
<body>
  <main>
    <h1>Local Service<br/>Radio</h1>
    <p class="subtitle"><span class="dot"></span>on air soon...</p>
    <p class="contact"><a href="mailto:hello@localserviceradio.nyc">hello@localserviceradio.nyc</a></p>
  </main>
</body>
</html>
